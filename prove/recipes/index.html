<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="author" content="Kaleiss Brugger">
	<meta name="description" content="Recipe Book website to find recipes">
	<title>RecipeBook</title>
	<link rel="stylesheet" href="recipes.css">
	<!-- <script src="[].js" defer></script> -->

	<!-- Open Graph (Facebook, LinkedIn, etc.) -->
	<meta property="og:type" content="website">
	<meta property="og:title" content="RecipeBook">
	<meta property="og:description" content="Recipe Book website to find recipes">
	<meta property="og:url" content="https://violet-foxe.github.io/wdd131/prove/recipes/index.html">
    <meta property="og:image" content="assets/recipe-book-social-preview.jpg">

	<!-- X Card -->
	<meta name="twitter:card" content="Social Preview Image">
	<meta name="twitter:title" content="RecipeBook">
	<meta name="twitter:description" content="Recipe Book website to find recipes">
	<meta name="twitter:image" content="recipe-book-social-preview.jpg">

	<!-- One favicon (ICO works everywhere) -->
	<link rel="icon" href="assets/recipe-book.png">

	<!-- One Apple Touch Icon (iOS home screen) -->
	<link rel="apple-touch-icon" href="assets/recipe-book.png">
</head>

<body>
	<header>
		<div id="title-container">
			<img src="assets/recipe-book.png" alt="RecipeBook Logo">
			<h1>RecipeBook</h1>
		</div>
		<!-- search bar -->
		<div id="search-bar-container">
			<input id="search-bar" type="text" placeholder="Find a Recipe">
			<img src="assets/search.svg" alt="search icon">
		</div>
	</header>
	<hr>
	<main>
		<section class="recipe">
			<img src="assets/apple-crisp.jpg" alt="delicious apple crisple with a scoop of icecream." fetchpriority=high>
			<div class="info">
				<p class="type">dessert</p>
				<h2>Apple Crisp</h2>
				<span class="rating" role="img" aria-label="Rating: 4 out of 5 stars">
					<span aria-hidden="true" class="icon-star">⭐</span>
					<span aria-hidden="true" class="icon-star">⭐</span>
					<span aria-hidden="true" class="icon-star">⭐</span>
					<span aria-hidden="true" class="icon-star">⭐</span>
					<span aria-hidden="true" class="icon-star-empty">☆</span>
				</span>
				<p class="desc">This apple crisp recipe is a simple yet delicious fall dessert that's great served warm with
					vanilla ice cream.</p>
			</div>
		</section>
	</main>
	<footer>
		<div class="social">
			<!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
			<a href="#"><img src="assets/instagram_icon.svg" alt="instagram icon"></a>
			<a href="#"><img src="assets/youtube_icon.svg" alt="youtube icon"></a>
			<a href="#"><img src="assets/pinterest_icon.svg" alt="pinterest icon"></a>
		</div>
		<a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik -
			Flaticon</a>
	</footer>
</body>

</html>
