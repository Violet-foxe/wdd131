<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Kaleiss Brugger">
  <meta name="description" content="event form that lets you have multiple options for things">
  <title>Event Form</title>
  <link rel="stylesheet" href="eventform.css">
  <script src="eventform.js" defer></script>
</head>

<body>
  <main class="wrapper">
    <h1>Event Ticket</h1>

    <form id="eventForm">

      <div class="field">
        <label for="firstName">First Name</label>
        <input id="firstName" name="firstName" type="text" required>
      </div>

      <div class="field">
        <label for="lastName">Last Name</label>
        <input id="lastName" name="lastName" type="text" required>
      </div>

      <div class="field full">
        <label for="email">Email</label>
        <input id="email" name="email" type="email" required>
      </div>

      <div class="field">
        <label for="personType">Type</label>
        <select id="personType" name="personType" aria-controls="NumContainer" required>
          <option value="">Choose One</option>
          <option value="student">Student</option>
          <option value="guest">Guest</option>
        </select>
      </div>

      <div class="field">
        <label for="date">Event Date</label>
        <input id="date" name="date" type="date" required>
      </div>

      <!-- extra -->
      <div id="NumContainer" class="field full">
        <div id="idContainer" class="field full" hidden>
          <label for="id" class="hide">Student I#</label>
          <input id="id" name="id" type="text">
        </div>
        <div id="codeContainer" class="field full" hidden>
          <label for="code" class="hide">Access Code</label>
          <input id="code" name="code" type="text">
        </div>
      </div>

      <!-- submit button -->
      <button class="full" type="submit">Create Ticket</button>

    </form>

    <!-- output -->
    <section id="output" aria-live="polite"></section>

  </main>
</body>

</html>
