<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<meta name="author" content="Kaleiss Brugger">
	<meta name="description" content="Recipe Book website to find recipes">
	<title>RecipeBook</title>
	<link rel="stylesheet" href="recipes.css">
	<script src="recipes.js" type="module" defer></script>

	<!-- Open Graph (Facebook, LinkedIn, etc.) -->
	<meta property="og:type" content="website">
	<meta property="og:title" content="RecipeBook">
	<meta property="og:description" content="Recipe Book website to find recipes">
	<meta property="og:url" content="https://violet-foxe.github.io/wdd131/prove/recipes/index.html">
	<meta property="og:image" content="images/recipe-book-social-preview.jpg">

	<!-- X Card -->
	<meta name="twitter:card" content="Social Preview Image">
	<meta name="twitter:title" content="RecipeBook">
	<meta name="twitter:description" content="Recipe Book website to find recipes">
	<meta name="twitter:image" content="recipe-book-social-preview.jpg">

	<!-- One favicon (ICO works everywhere) -->
	<link rel="icon" href="images/recipe-book.png">

	<!-- One Apple Touch Icon (iOS home screen) -->
	<link rel="apple-touch-icon" href="images/recipe-book.png">
</head>

<body>
	<header>
		
		<div id="title-container">
			<img src="images/recipe-book.png" alt="RecipeBook Logo">
			<h1>RecipeBook</h1>
		</div>

		<!-- search bar -->
		<div id="search-bar-container">
			<input id="search-bar" type="text" placeholder="Find a Recipe">
			<button id="search-button"><img src="images/search.svg" alt="search icon"></button>
		</div>

	</header>
	<hr>
	<main>

		<div id="recipe-container"></div>

	</main>
	<footer>

		<div class="social">
			<!-- Social media icons provided under CC from https://www.iconfinder.com/AlfredoCreates  -->
			<a href="#"><img src="images/instagram_icon.svg" alt="instagram icon"></a>
			<a href="#"><img src="images/youtube_icon.svg" alt="youtube icon"></a>
			<a href="#"><img src="images/pinterest_icon.svg" alt="pinterest icon"></a>
		</div>

		<a href="https://www.flaticon.com/free-icons/recipe" title="recipe icons">Recipe icons created by Freepik -
			Flaticon</a>

	</footer>
</body>

</html>
